upstream eligibilite_backend {
    server 127.0.0.1:8047;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name eligibilite.dahouse.fr;

    ssl_certificate /etc/nginx/ssl/eligibilite.crt;
    ssl_certificate_key /etc/nginx/ssl/eligibilite.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://eligibilite_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name eligibilite.dahouse.fr;
    return 301 https://$host$request_uri;
}
