services:
  eligibilite:
    build: .
    container_name: eligibilite-backend
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8047/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
