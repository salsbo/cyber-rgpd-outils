services:
  scan-ports:
    build: .
    container_name: scan-ports-backend
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8044/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
