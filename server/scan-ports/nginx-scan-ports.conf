# Scan Ports API — scan-ports.dahouse.fr
# SSL terminé par Cloudflare (Full mode)

upstream scan_ports_backend {
    server 127.0.0.1:8044;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name scan-ports.dahouse.fr;

    ssl_certificate /etc/nginx/ssl/scan-ports.crt;
    ssl_certificate_key /etc/nginx/ssl/scan-ports.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://scan_ports_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name scan-ports.dahouse.fr;
    return 301 https://$host$request_uri;
}
