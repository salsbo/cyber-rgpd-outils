# Visio Test API — visio-test.dahouse.fr
# Reverse proxy vers le conteneur Docker (port 8043)
# SSL terminé par Cloudflare (Full mode)

upstream visio_test_backend {
    server 127.0.0.1:8043;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name visio-test.dahouse.fr;

    ssl_certificate /etc/nginx/ssl/visio-test.crt;
    ssl_certificate_key /etc/nginx/ssl/visio-test.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Token API
    location /token {
        proxy_pass http://visio_test_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check
    location /health {
        proxy_pass http://visio_test_backend;
    }

    # WebSocket signaling (token in path)
    location /ws/ {
        proxy_pass http://visio_test_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name visio-test.dahouse.fr;
    return 301 https://$host$request_uri;
}
