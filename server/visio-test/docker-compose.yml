services:
  visio-test:
    build: .
    container_name: visio-test-backend
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8043/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
