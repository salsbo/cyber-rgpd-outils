# Speed Test API — speed-test.dahouse.fr
# SSL terminé par Cloudflare (Full mode)

upstream speed_test_backend {
    server 127.0.0.1:8046;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name speed-test.dahouse.fr;

    ssl_certificate /etc/nginx/ssl/speed-test.crt;
    ssl_certificate_key /etc/nginx/ssl/speed-test.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://speed_test_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name speed-test.dahouse.fr;
    return 301 https://$host$request_uri;
}
