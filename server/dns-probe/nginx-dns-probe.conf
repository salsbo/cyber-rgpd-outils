# DNS Probe API — dns-probe.dahouse.fr
# + Wildcard *.probe.dahouse.fr (répond à la requête fetch du client)
# SSL terminé par Cloudflare (Full mode)

upstream dns_probe_backend {
    server 127.0.0.1:8045;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dns-probe.dahouse.fr *.probe.dahouse.fr;

    ssl_certificate /etc/nginx/ssl/dns-probe.crt;
    ssl_certificate_key /etc/nginx/ssl/dns-probe.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Access-Control-Allow-Origin "https://dahouse.fr" always;

    # Probe fetch endpoint (wildcard subdomains)
    location = /probe.gif {
        # Return a 1x1 transparent GIF
        empty_gif;
        access_log off;
    }

    # API endpoints
    location / {
        proxy_pass http://dns_probe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name dns-probe.dahouse.fr *.probe.dahouse.fr;
    return 301 https://$host$request_uri;
}
