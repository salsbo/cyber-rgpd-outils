services:
  dns-probe:
    build: .
    container_name: dns-probe-backend
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8045/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
